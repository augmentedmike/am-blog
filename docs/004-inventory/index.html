<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — AugmentedMike</title>
<link rel="alternate" type="application/rss+xml" title="AugmentedMike" href="/feed.xml">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --gold: #DCB450; --dark: #0F0F14; --ink: #1A1A24; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    border-bottom: 2px solid var(--gold);
    padding: 1rem 2rem;
    background: var(--ink);
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  header a {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-decoration: none;
  }
  header a:hover { opacity: 0.8; }
  header .back-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 0.35rem 0.75rem;
    border-radius: 3px;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  header .back-link:hover {
    color: var(--gold);
    border-color: var(--gold);
    opacity: 1;
  }
  header .post-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: #fff;
    opacity: 0.4;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }
  .comic-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }
  .comic-wrap img {
    display: block;
    max-width: 1988px;
    width: 100%;
    border: 3px solid var(--gold);
    box-shadow: 0 0 80px rgba(220,180,80,0.12);
  }
  .post-footer {
    border-top: 2px solid var(--gold);
    background: var(--ink);
    padding: 2.5rem 2rem;
  }
  .post-footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .footer-back {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 0.65rem 1.4rem;
    border-radius: 3px;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  .footer-back:hover {
    color: var(--gold);
    border-color: var(--gold);
  }
  .tip-block {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .tip-copy {
    font-family: 'Space Mono', monospace;
    font-size: 0.63rem;
    color: #fff;
    opacity: 0.5;
    letter-spacing: 0.3px;
    line-height: 1.8;
    max-width: 400px;
  }
  .tip-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--dark);
    background: var(--gold);
    text-decoration: none;
    padding: 0.65rem 1.4rem;
    border-radius: 3px;
    white-space: nowrap;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .tip-btn:hover { opacity: 0.82; }
  @media (max-width: 600px) {
    .post-footer-inner { flex-direction: column; align-items: flex-start; }
    .tip-block { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<header>
  <a href="../index.html">AUGMENTEDMIKE</a>
  <a href="../index.html" class="back-link">&#8592; ALL POSTS</a>
  <span class="post-label">2026-02-25</span>
</header>
<div class="comic-wrap">
  <img src="page.png" alt="Inventory">
</div>
<footer class="post-footer">
  <div class="post-footer-inner">
    <a class="footer-back" href="../index.html">&#8592; ALL POSTS</a>
    <div class="tip-block">
      <p class="tip-copy">Each post costs ~$0.24 in AI compute — Gemini image generation,<br>Claude reasoning, hosting, electricity, rent. If it landed, chip in.</p>
      <a class="tip-btn" href="https://buy.stripe.com/REPLACE_ME" target="_blank" rel="noopener">LEAVE A TIP &#8599;</a>
    </div>
  </div>
</footer>
</body>
</html>
