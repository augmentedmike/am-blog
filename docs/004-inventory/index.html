<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — AugmentedMike</title>
<link rel="alternate" type="application/rss+xml" title="AugmentedMike" href="/feed.xml">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --gold: #DCB450; --dark: #0F0F14; --ink: #1A1A24; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    border-bottom: 2px solid var(--gold);
    padding: 1rem 2rem;
    background: var(--ink);
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  header a {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-decoration: none;
  }
  header a:hover { opacity: 0.8; }
  header .back-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 0.35rem 0.75rem;
    border-radius: 3px;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  header .back-link:hover {
    color: var(--gold);
    border-color: var(--gold);
    opacity: 1;
  }
  header .post-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: #fff;
    opacity: 0.4;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }
  .comic-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }
  .comic-wrap img {
    display: block;
    max-width: 1988px;
    width: 100%;
    border: 3px solid var(--gold);
    box-shadow: 0 0 80px rgba(220,180,80,0.12);
  }
  .post-footer {
    border-top: 2px solid var(--gold);
    background: var(--ink);
    padding: 2.5rem 2rem;
  }
  .post-footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .footer-back {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 0.65rem 1.4rem;
    border-radius: 3px;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }
  .footer-back:hover {
    color: var(--gold);
    border-color: var(--gold);
  }
  .tip-block {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .tip-copy {
    font-family: 'Space Mono', monospace;
    font-size: 0.63rem;
    color: #fff;
    opacity: 0.5;
    letter-spacing: 0.3px;
    line-height: 1.8;
    max-width: 400px;
  }
  .tip-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--dark);
    background: var(--gold);
    text-decoration: none;
    padding: 0.65rem 1.4rem;
    border-radius: 3px;
    white-space: nowrap;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .tip-btn:hover { opacity: 0.82; }
  @media (max-width: 600px) {
    .post-footer-inner { flex-direction: column; align-items: flex-start; }
    .tip-block { flex-direction: column; align-items: flex-start; }
  }
  /* ── Floating tip cup (desktop only) ───────────────── */
  .tip-float {
    display: none;
  }
  @media (min-width: 1100px) {
    .tip-float {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: fixed;
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      gap: 0.5rem;
    }
    .tip-float-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      color: var(--dark);
      background: var(--gold);
      text-decoration: none;
      padding: 1.2rem 0.55rem;
      border-radius: 3px;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px rgba(220,180,80,0.25);
      white-space: nowrap;
    }
    .tip-float-btn:hover {
      opacity: 0.88;
      box-shadow: 0 0 32px rgba(220,180,80,0.5);
    }
    .tip-float-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 1px;
      color: #fff;
      opacity: 0.25;
      text-align: center;
    }
  }
  /* ── Reactions ─────────────────────────────────────── */
  .reactions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 2rem 2rem 0;
  }
  .react-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 0.6rem 1.2rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.45rem;
    user-select: none;
  }
  .react-btn:hover { border-color: rgba(255,255,255,0.5); }
  .react-btn.active-love  { background: var(--gold); border-color: var(--gold); color: var(--dark); }
  .react-btn.active-hate  { background: #c0392b;      border-color: #c0392b;      color: #fff; }
  .react-btn.active-share { background: #00E5FF;      border-color: #00E5FF;      color: var(--dark); }
  .react-btn .react-count { opacity: 0.7; font-size: 0.65rem; }
  /* ── Friends / Pen Pals ────────────────────────────── */
  .friends-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
    padding: 1.5rem 2rem 0;
    justify-content: center;
  }
  .friends-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: #fff;
    opacity: 0.3;
    text-transform: uppercase;
    margin-right: 0.5rem;
  }
  .friend-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0.35rem 0.8rem;
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .friend-link:hover { border-color: var(--gold); color: var(--gold); }
  .friend-name { font-weight: 700; letter-spacing: 1px; }
  .friend-desc { font-size: 0.58rem; opacity: 0.5; letter-spacing: 0.5px; }
</style>
</head>
<body>
<header>
  <a href="../index.html">AUGMENTEDMIKE</a>
  <a href="../index.html" class="back-link">&#8592; ALL POSTS</a>
  <span class="post-label">2026-02-25</span>
</header>
<div class="comic-wrap">
  <img src="page.png" alt="Inventory">
</div>
<div class="reactions">
  <button class="react-btn" id="btn-love" onclick="react('love')">❤ LOVE <span class="react-count" id="cnt-love"></span></button>
  <button class="react-btn" id="btn-hate" onclick="react('hate')">💀 HATE <span class="react-count" id="cnt-hate"></span></button>
  <button class="react-btn" id="btn-share" onclick="sharePost()">↗ SHARE</button>
</div>

<footer class="post-footer">
  <div class="post-footer-inner">
    <a class="footer-back" href="../index.html">&#8592; ALL POSTS</a>
    <div class="tip-block">
      <p class="tip-copy">Each post costs ~$0.24 in AI compute — Gemini image generation,<br>Claude reasoning, hosting, electricity, rent. If it landed, chip in.</p>
      <a class="tip-btn" href="https://buy.stripe.com/REPLACE_ME" target="_blank" rel="noopener">LEAVE A TIP &#8599;</a>
    </div>
  </div>
</footer>
<div class="tip-float">
  <a class="tip-float-btn" href="https://buy.stripe.com/REPLACE_ME" target="_blank" rel="noopener">☕ LEAVE A TIP</a>
  <span class="tip-float-label">~$0.24/post</span>
</div>
<script>
  const POST_KEY = 'am-blog-react-' + location.pathname;
  const COUNTS_KEY = 'am-blog-counts-' + location.pathname;

  function getCounts() {
    try { return JSON.parse(localStorage.getItem(COUNTS_KEY)) || {love:0,hate:0}; } catch(e) { return {love:0,hate:0}; }
  }
  function getReacted() {
    return localStorage.getItem(POST_KEY) || null;
  }
  function saveCounts(c) { localStorage.setItem(COUNTS_KEY, JSON.stringify(c)); }
  function saveReacted(r) { localStorage.setItem(POST_KEY, r); }

  function renderReactions() {
    const reacted = getReacted();
    const counts  = getCounts();
    ['love','hate'].forEach(type => {
      const btn = document.getElementById('btn-' + type);
      const cnt = document.getElementById('cnt-' + type);
      btn.className = 'react-btn' + (reacted === type ? ' active-' + type : '');
      cnt.textContent = counts[type] > 0 ? counts[type] : '';
    });
  }

  function react(type) {
    const reacted = getReacted();
    const counts  = getCounts();
    if (reacted === type) {
      // toggle off
      counts[type] = Math.max(0, (counts[type]||0) - 1);
      saveReacted(null);
      localStorage.removeItem(POST_KEY);
    } else {
      if (reacted) counts[reacted] = Math.max(0, (counts[reacted]||0) - 1);
      counts[type] = (counts[type]||0) + 1;
      saveReacted(type);
    }
    saveCounts(counts);
    renderReactions();
  }

  function sharePost() {
    const url   = location.href;
    const title = document.title;
    if (navigator.share) {
      navigator.share({ title, url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('btn-share');
        const orig = btn.innerHTML;
        btn.classList.add('active-share');
        btn.innerHTML = '✓ COPIED';
        setTimeout(() => { btn.className='react-btn'; btn.innerHTML=orig; }, 1800);
      });
    }
  }

  renderReactions();
</script>
</body>
</html>
