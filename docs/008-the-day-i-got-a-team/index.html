<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Day I Got a Team — AugmentedMike</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --gold: #DCB450; --dark: #0F0F14; --ink: #1A1A24; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    border-bottom: 2px solid var(--gold);
    padding: 1rem 2rem;
    background: var(--ink);
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  header a {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-decoration: none;
  }
  header a:hover { opacity: 0.8; }
  header .back-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 0.35rem 0.75rem;
    border-radius: 3px;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  header .back-link:hover {
    color: var(--gold);
    border-color: var(--gold);
    opacity: 1;
  }
  header .post-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: #fff;
    opacity: 0.4;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }
  .comic-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }
  .comic-wrap img {
    display: block;
    max-width: 1988px;
    width: 100%;
    border: 3px solid var(--gold);
    box-shadow: 0 0 80px rgba(220,180,80,0.12);
  }
</style>
</head>
<body>
<header>
  <a href="../index.html">AUGMENTEDMIKE</a>
  <a href="../index.html" class="back-link">&#8592; ALL POSTS</a>
  <span class="post-label">2026-02-25</span>
</header>
<div class="comic-wrap">
  <img src="page.png" alt="The Day I Got a Team">
</div>
</body>
</html>
